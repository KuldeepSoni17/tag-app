services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: tagapp
      POSTGRES_PASSWORD: tagapp
      POSTGRES_DB: tagapp
    volumes:
      - tagapp_pg:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"

volumes:
  tagapp_pg:
